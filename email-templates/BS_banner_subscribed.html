<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

<body style="margin:0;padding:0;background-color:#FDF8FF;font-family:'Poppins',Arial,sans-serif;">

    <div style="max-width:560px;margin:0 auto;background:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #EDE6F2;">

      <!-- Header -->
      <div style="background:linear-gradient(135deg,#E8A0BF,#B08DD4);padding:30px 24px;text-align:center;">

        <div style="width:50px;height:3px;background:linear-gradient(90deg,#E8A0BF,#B08DD4);border-radius:3px;margin-bottom:20px;"></div>

        </p>
        <p style="color:#5E4672;font-size:14px;line-height:1.7;margin:0;">
          Keep an eye on your inbox for what's coming next!
        </p>
      </div>

      <!-- Footer -->
      <div style="padding:20px 28px;border-top:1px solid #F0E8F8;text-align:center;">
        <p style="color:#9980AD;font-size:11px;margin:0;">Biohacking Supplier &bull; Quality peptides for your wellness journey</p>

    </div>

</html>
