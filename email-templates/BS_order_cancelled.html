<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Cancelled</title>
</head>
<body style="margin:0;padding:0;background-color:#FDF8FF;font-family:'Poppins',Arial,sans-serif;">
  <div style="background-color:#FDF8FF;padding:30px 15px;">
    <div style="max-width:560px;margin:0 auto;background:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #EDE6F2;">

      <!-- Header (darker purple for cancelled) -->
      <div style="background:linear-gradient(135deg,#9980AD,#7E56AB);padding:30px 24px;text-align:center;">
        <h1 style="color:#ffffff;font-size:22px;margin:0;font-weight:700;">Biohacking Supplier</h1>
      </div>

      <!-- Body -->
      <div style="padding:32px 28px;">
        <h2 style="color:#3D2B4A;font-size:20px;margin:0 0 12px;">Order Cancelled</h2>
        <div style="width:50px;height:3px;background:#9980AD;border-radius:3px;margin-bottom:20px;"></div>
        <p style="color:#5E4672;font-size:14px;line-height:1.7;margin:0 0 16px;">
          Hi {{ event.properties.customer_name }}, your order has been cancelled.
        </p>
        <p style="color:#5E4672;font-size:14px;line-height:1.7;margin:0;">
          If this was a mistake, please reach out to us and we'll help sort it out.
        </p>
      </div>

      <!-- Footer -->
      <div style="padding:20px 28px;border-top:1px solid #F0E8F8;text-align:center;">
        <p style="color:#9980AD;font-size:11px;margin:0;">Biohacking Supplier &bull; Quality peptides for your wellness journey</p>
      </div>
    </div>
  </div>
</body>
</html>
