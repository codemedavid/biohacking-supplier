<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update</title>
</head>
<body style="margin:0; padding:0; background-color:#FDF8FF; font-family:Arial, sans-serif; font-size:14px; color:#3D2B4A; line-height:1.6;">

    <div style="max-width:560px; margin:30px auto; background-color:#ffffff; border-radius:8px; border:1px solid #EDE6F2; overflow:hidden;">

        <!-- Pink accent line -->
        <div style="height:3px; background: linear-gradient(to right, #E8A0BF, #B08DD4);"></div>

        <div style="padding:32px 28px;">

            <!-- Brand name -->
            <p style="margin:0 0 24px 0; font-size:13px; font-weight:bold; color:#E8A0BF; letter-spacing:0.5px;">BIOHACKING SUPPLIER</p>

            <p style="margin:0 0 16px 0;">Hi {{name}},</p>

            <p style="margin:0 0 16px 0;">Quick heads up — we just restocked a few items you might be interested in.</p>

            <!-- Highlight box with purple accent -->
            <div style="background-color:#F8F4FC; border-left:3px solid #B08DD4; padding:12px 16px; border-radius:0 6px 6px 0; margin:20px 0;">
                <p style="margin:0; font-size:13px; color:#5E4672;">
                    Check out what's new: <a href="https://biohackingsupplier.com" style="color:#9A72C4; text-decoration:none; font-weight:bold;">biohackingsupplier.com</a>
                </p>
            </div>

            <!-- Subtle divider -->
            <div style="border-top:1px solid #F0E8F8; margin:24px 0;"></div>

            <p style="margin:0; color:#7A608F;">
                — Biohacking Supplier
            </p>
        </div>

        <!-- Footer -->
        <div style="padding:16px 28px; background-color:#FDF8FF; border-top:1px solid #F0E8F8;">
            <p style="margin:0; font-size:11px; color:#9980AD;">
                You're receiving this because you signed up at biohackingsupplier.com. Reply "unsubscribe" to opt out.
            </p>
        </div>

    </div>

</body>
</html>
